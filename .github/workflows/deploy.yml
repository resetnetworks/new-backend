name: Build and Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t resetnetworks/new-music-backend:$TAG .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Push image
        run: docker push resetnetworks/new-music-backend:$TAG

      # ✅ Decode SSH key safely
      - name: Create SSH key file
        run: |
          echo "${{ secrets.SSH_KEY_BASE64 }}" | base64 -d > key.pem
          chmod 600 key.pem
          ls -la key.pem  # optional debug

      # ✅ Deploy using SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key_path: key.pem
          debug: true
          envs: TAG
          script: |
            cd app
            docker pull resetnetworks/new-music-backend:$TAG
            docker-compose -f docker-compose.prod.yml down
            TAG=$TAG docker-compose -f docker-compose.prod.yml up -d