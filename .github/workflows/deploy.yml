name: Build and Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t resetnetworks/new-music-backend:$TAG .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Push image
        run: docker push resetnetworks/new-music-backend:$TAG

      - name: Deploy to EC2
        env:
          TAG: ${{ env.TAG }}
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_IP }} \
            "cd app && \
             docker pull resetnetworks/new-music-backend:$TAG && \
             docker-compose -f docker-compose.prod.yml down && \
             TAG=$TAG docker-compose -f docker-compose.prod.yml up -d"
          rm -f key.pem